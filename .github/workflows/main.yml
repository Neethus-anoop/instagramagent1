jobs:
  bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt in early to Node.js 24
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4   # keep updated to latest release

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Auto-Reply Bot
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_API_URL: ${{ secrets.IG_API_URL }}
        run: |
          python -u <<EOF
          import os, requests, json
          POST_URL = os.getenv('IG_API_URL')
          REPLY_TEXT = os.getenv('reply_text')
          print("Replying to post:", POST_URL)
          EOF
